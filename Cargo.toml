[package]
name = "sark_pathfinding"
version = "0.2.0"
edition = "2021"
homepage = "https://github.com/sarkahn/sark_pathfinding_rs"
repository = "https://github.com/sarkahn/sark_pathfinding_rs"
license = "MIT"
readme = "README.md"
description = "A simple implementation of the astar pathfinding algorthim from red blob games https://www.redblobgames.com/pathfinding/a-star/implementation.html."
keywords = ["bevy", "pathfinding", "2d", "astar"]

[dependencies]
glam = "0.21"
arrayvec = "0.7.2"
sark_grids= {path="../sark_grids_rs", version="0.5"}
ahash = "0.7.6"

[dev-dependencies]
bevy = {path="../bevy", version = "0.8.0-dev", default-features = false, features = ["png", "bevy_winit", "bevy_render", "bevy_core_pipeline", "bevy_sprite"]}
bevy_ascii_terminal = {path="../bevy_ascii_terminal", version="0.11"}
noise = "0.7.0"
criterion = "0.3"

[[bench]]
name = "bench"
harness = false